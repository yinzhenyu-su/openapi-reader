swagger: '2.0'
info:
  title: Swagger Pet Store
  version: '1.0.0'
host: petstore.swagger.io
basePath: /v1
schemes:
  - https
paths:
  /pets:
    get:
      summary: List all pets
      operationId: listPets
      produces:
        - application/json
      parameters:
        - name: limit
          in: query
          required: false
          type: integer
          description: Items per page
      responses:
        '200':
          description: A list of pets
          schema:
            type: array
            items:
              $ref: '#/definitions/Pet'
definitions:
  Pet:
    type: object
    required:
      - id
      - name
    properties:
      id:
        type: integer
        format: int64
        description: Pet ID
      name:
        type: string
        description: Pet name
      status:
        type: string
        enum:
          - available
          - pending
          - sold
